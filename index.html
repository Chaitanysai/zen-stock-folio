<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />

    <!-- ── Brand ── -->
    <title>ZenFolio — Indian Stock Portfolio Tracker</title>
    <meta name="description" content="Real-time NSE/BSE portfolio tracker with AI insights, trade journal, F&O tracking and sector analysis. Built for Indian stock market investors." />
    <meta name="author" content="ZenFolio" />
    <meta name="application-name" content="ZenFolio" />

    <!-- Theme color matching navy brand -->
    <meta name="theme-color" content="#1c3557" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZenFolio" />

    <!-- Misc -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="ZenFolio — Indian Stock Portfolio Tracker" />
    <meta property="og:description" content="Real-time NSE/BSE portfolio tracking with AI insights, F&O journal, and sector analysis." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZenFolio" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ZenFolio" />
    <meta name="twitter:description" content="Indian stock portfolio tracker with AI insights and F&O tracking." />

    <!-- Favicon — ZenFolio navy logo (matches sidebar logo exactly) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Preconnect for Google Fonts used in app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
