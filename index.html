<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile viewport — critical for proper mobile rendering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />

    <title>Smart Stock Tracker</title>
    <meta name="description" content="Portfolio & Trade Dashboard for Indian Markets — track stocks, trades, watchlist, alerts and AI insights." />
    <meta name="author" content="Smart Stock Tracker" />

    <!-- Theme color for browser chrome on mobile -->
    <meta name="theme-color" content="#0f0a18" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fff5f0" media="(prefers-color-scheme: light)" />

    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stock Tracker" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:title" content="Smart Stock Tracker" />
    <meta property="og:description" content="Portfolio & Trade Dashboard for Indian Markets" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
